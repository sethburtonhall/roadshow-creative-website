<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roadshow Creative — LinkedIn Banner Options</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1584px;
    background: #0C0C0B;
  }

  .label {
    font-family: monospace;
    font-size: 11px;
    color: #4A4946;
    padding: 10px 24px 0;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .banner {
    width: 1584px;
    height: 396px;
    background: #0C0C0B;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 700px 260px at 50% 50%, rgba(245,165,36,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .divider-line {
    width: 100%;
    height: 1px;
    background: #1C1C19;
  }

  /* ══════════════════════════════
     OPTION A — Superscript badge
  ══════════════════════════════ */
  .opt-a {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .opt-a-wordmark-row {
    display: flex;
    align-items: flex-start;
  }

  .opt-a-wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 190px;
    color: #F2F0EB;
    letter-spacing: 0.03em;
    line-height: 1;
  }

  .opt-a-badge {
    margin-left: 6px;
    margin-top: 12px;
  }

  .opt-a-badge svg {
    width: 50px;
    height: 50px;
    display: block;
  }

  .opt-a-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    color: #8A8884;
    letter-spacing: 0.45em;
    margin-top: 2px;
    align-self: flex-end;
    padding-right: 58px;
  }

  /* ══════════════════════════════
     OPTION B — SaaS-style horizontal
     icon left, wordmark right
  ══════════════════════════════ */
  .opt-b {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .opt-b-top {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .opt-b-icon svg {
    width: 108px;
    height: 108px;
    display: block;
    flex-shrink: 0;
  }

  .opt-b-wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    color: #F2F0EB;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .opt-b-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #8A8884;
    letter-spacing: 0.5em;
    margin-top: 2px;
    width: 100%;
    text-align: right;
  }
</style>
</head>
<body>

<div class="label">Option A — Superscript badge</div>
<div class="banner">
  <div class="opt-a">
    <div class="opt-a-wordmark-row">
      <span class="opt-a-wordmark">ROADSHOW</span>
      <span class="opt-a-badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="#F5A524" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/>
        </svg>
      </span>
    </div>
    <div class="opt-a-sub">Creative</div>
  </div>
</div>

<div class="divider-line"></div>
<div class="label">Option B — SaaS horizontal logomark</div>
<div class="banner">
  <div class="opt-b">
    <div class="opt-b-top">
      <div class="opt-b-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="#F5A524" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/>
        </svg>
      </div>
      <div class="opt-b-wordmark">Roadshow</div>
    </div>
    <div class="opt-b-sub">Creative</div>
  </div>
</div>

</body>
</html>
